<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NGO Dashboard - FoodBridge</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet" />
    <style>
      .token-card {
        transition: transform 0.2s;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }
      .token-card:hover {
        transform: translateY(-5px);
      }
      .page-header {
        background: linear-gradient(135deg, #16a34a 0%, #15803d 100%);
        padding: 2rem 0;
        margin-bottom: 2rem;
      }
      .coordinates-display {
        font-size: 0.9em;
        color: #666;
        margin-top: 5px;
      }
      .suggestions-container {
        position: absolute;
        width: 100%;
        max-height: 200px;
        overflow-y: auto;
        background: white;
        border: 1px solid #ddd;
        border-radius: 4px;
        z-index: 1000;
        display: none;
      }
      .suggestion-item {
        padding: 8px 12px;
        cursor: pointer;
        border-bottom: 1px solid #eee;
      }
      .suggestion-item:hover {
        background-color: #f8f9fa;
      }
      .search-wrapper {
        position: relative;
      }
      .distance-badge {
        position: absolute;
        top: 10px;
        right: 10px;
        background: rgba(0, 0, 0, 0.7);
        color: white;
        padding: 5px 10px;
        border-radius: 15px;
        font-size: 0.8em;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-success fixed-top">
      <div class="container">
        <a class="navbar-brand" href="#">
          <i class="fas fa-utensils me-2"></i>FoodBridge
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div
          class="collapse navbar-collapse justify-content-end"
          id="navbarNav"
        >
          <ul class="navbar-nav">
            <li class="nav-item me-3">
              <button id="setLocationBtn" class="btn btn-light">
                <i class="fas fa-map-marker-alt me-2"></i>Set Location
              </button>
            </li>
            <li class="nav-item">
              <button id="logoutBtn" class="btn btn-light">
                <i class="fas fa-sign-out-alt me-2"></i>Logout
              </button>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="page-header text-white text-center" style="margin-top: 56px;">
      <h1 class="display-4" id="welcome-message">Welcome to Your Dashboard</h1>
      <p class="lead">Find and claim available food donations</p>
    </div>

    <div class="container py-4">
      <div class="row mb-4">
        <div class="col-12">
          <div class="d-flex justify-content-between align-items-center">
            <h2>Available Food Tokens</h2>
            <div class="form-group">
              <label for="radiusFilter" class="me-2">Search Radius:</label>
              <select id="radiusFilter" class="form-select form-select-sm" style="width: 150px; display: inline-block;">
                <option value="5">5 km</option>
                <option value="10">10 km</option>
                <option value="20">20 km</option>
                <option value="30" selected>30 km</option>
                <option value="50">50 km</option>
                <option value="100">100 km</option>
              </select>
            </div>
          </div>
          <div class="col-md-4 mb-3">
            <button id="reloadBtn" class="btn btn-primary">
              <i class="fas fa-sync-alt me-2"></i>Reload Tokens
            </button>
            <button id="clearCacheBtn" class="btn btn-warning ms-2">
              <i class="fas fa-broom me-2"></i>Clear Cache &amp; Reload
            </button>
          </div>
          <div id="available-tokens" class="row mt-3">
            <!-- Available tokens will be loaded here -->
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-12">
          <h2>Your Claimed Tokens</h2>
          <div id="claimed-tokens" class="row mt-3">
            <!-- Claimed tokens will be loaded here -->
          </div>
        </div>
      </div>
    </div>

    <!-- Location Modal -->
    <div class="modal fade location-modal" id="locationModal" tabindex="-1">
      <div class="modal-dialog modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Set Your Location</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <div class="mb-3">
              <label for="searchLocation" class="form-label">Search Location</label>
              <div class="search-wrapper">
                <input type="text" class="form-control" id="searchLocation" 
                       placeholder="Start typing to search for a location in India...">
                <div id="suggestions" class="suggestions-container"></div>
              </div>
            </div>
            <div class="mb-3">
              <label for="location" class="form-label">Address Description</label>
              <textarea class="form-control" id="location" rows="2" required 
                        placeholder="Enter detailed address"></textarea>
            </div>
            <div class="mb-3">
              <div class="coordinates-display" id="coordinates">
                Selected coordinates: Not set
              </div>
            </div>
            <div class="mt-3">
              <p>Or use your current location:</p>
              <button id="useCurrentLocation" class="btn btn-primary">
                <i class="fas fa-location-arrow me-2"></i>Use My Current Location
              </button>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="button" class="btn btn-success" id="saveLocation">Save Location</button>
          </div>
        </div>
      </div>
    </div>

    <footer class="footer bg-dark text-light mt-5">
      <div class="container text-center py-4">
        <div class="row">
          <div class="col-md-4">
            <a class="btn btn-link text-light" href="#">About</a>
          </div>
          <div class="col-md-4">
            <a class="btn btn-link text-light" href="#">Contact</a>
          </div>
          <div class="col-md-4">
            <a class="btn btn-link text-light" href="#">Privacy Policy</a>
          </div>
        </div>
        <div class="copyright mt-3">
          &copy; 2025 FoodBridge. All Rights Reserved.
        </div>
      </div>
    </footer>

    <div id="debug-output" class="container mt-4" style="background-color: #f8f9fa; padding: 15px; border-radius: 5px;">
        <h4>Debug Information</h4>
        <div id="debug-content" style="font-family: monospace; white-space: pre-wrap;"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/ngoDashboard.js"></script>

    <script>
        // Debug helper function
        function addDebugInfo(message) {
            const debugContent = document.getElementById('debug-content');
            const timestamp = new Date().toLocaleTimeString();
            debugContent.innerHTML += `[${timestamp}] ${message}\n`;
        }

        // Override console.log, error, warn
        const originalLog = console.log;
        const originalError = console.error;
        const originalWarn = console.warn;

        console.log = function() {
            originalLog.apply(console, arguments);
            addDebugInfo('LOG: ' + Array.from(arguments).join(' '));
        };

        console.error = function() {
            originalError.apply(console, arguments);
            addDebugInfo('ERROR: ' + Array.from(arguments).join(' '));
        };

        console.warn = function() {
            originalWarn.apply(console, arguments);
            addDebugInfo('WARN: ' + Array.from(arguments).join(' '));
        };

        // Log token information
        window.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('authToken');
            if (token) {
                const maskedToken = token.substring(0, 15) + '...' + token.substring(token.length - 10);
                addDebugInfo(`Auth token: ${maskedToken}`);
            } else {
                addDebugInfo('No auth token found!');
            }
        });

        document.addEventListener('DOMContentLoaded', function() {
            // Add event listener for reload button
            document.getElementById('reloadBtn').addEventListener('click', function() {
                loadAvailableTokens();
                loadClaimedTokens();
            });
            
            // Add event listener for clear cache button
            document.getElementById('clearCacheBtn').addEventListener('click', function() {
                localStorage.removeItem('ngoLocation');
                location.reload(true); // Force reload from server
            });
        });
    </script>
  </body>
</html>

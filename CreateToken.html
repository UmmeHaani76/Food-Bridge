<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Food Token - FoodBridge</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
      .form-container {
        max-width: 800px;
        margin: 80px auto 30px;
        padding: 20px;
        background: #fff;
        border-radius: 10px;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
      }
      .coordinates-display {
        font-size: 0.9em;
        color: #666;
        margin-top: 5px;
      }
      .suggestions-container {
        position: absolute;
        width: 100%;
        max-height: 200px;
        overflow-y: auto;
        background: white;
        border: 1px solid #ddd;
        border-radius: 4px;
        z-index: 1000;
        display: none;
      }
      .suggestion-item {
        padding: 8px 12px;
        cursor: pointer;
        border-bottom: 1px solid #eee;
      }
      .suggestion-item:hover {
        background-color: #f8f9fa;
      }
      .search-wrapper {
        position: relative;
      }
    </style>
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-success fixed-top">
      <div class="container">
        <a class="navbar-brand" href="#">
          <i class="fas fa-utensils me-2"></i>FoodBridge
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div
          class="collapse navbar-collapse justify-content-end"
          id="navbarNav"
        >
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="btn btn-light" href="donorDashboard.html">
                <i class="fas fa-arrow-left me-2"></i>Back to Dashboard
              </a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container">
      <div class="form-container">
        <h2 class="text-center mb-4">Create Food Token</h2>
        <form id="tokenForm">
          <div class="mb-3">
            <label for="type" class="form-label">Food Type</label>
            <select class="form-select" id="type" required>
              <option value="">Select food type</option>
              <option value="Veg">Vegetarian</option>
              <option value="Non-Veg">Non-Vegetarian</option>
              <option value="Mixed">Mixed</option>
            </select>
          </div>
          
          <div class="mb-3">
            <label for="quantity" class="form-label">Quantity (servings)</label>
            <input type="number" class="form-control" id="quantity" required min="1">
          </div>
          
          <div class="mb-3">
            <label for="searchLocation" class="form-label">Search Location</label>
            <div class="search-wrapper">
              <input type="text" class="form-control" id="searchLocation" 
                     placeholder="Start typing to search for a location in India...">
              <div id="suggestions" class="suggestions-container"></div>
            </div>
          </div>

          <div class="mb-3">
            <label for="location" class="form-label">Address Description</label>
            <textarea class="form-control" id="location" rows="2" required 
                      placeholder="Enter detailed address for pickup"></textarea>
          </div>

          <div class="mb-3">
            <div class="coordinates-display" id="coordinates">
              Selected coordinates: Not set
            </div>
          </div>

          <div class="d-grid gap-2">
            <button type="submit" class="btn btn-success">
              <i class="fas fa-plus-circle me-2"></i>Create Token
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
      let selectedLocation = null;
      let searchTimeout = null;

      document.addEventListener('DOMContentLoaded', function() {
        // Check authentication
        const token = localStorage.getItem('authToken');
        if (!token) {
          window.location.href = 'login.html';
          return;
        }

        const searchInput = document.getElementById('searchLocation');
        const suggestionsContainer = document.getElementById('suggestions');

        // Handle search input
        searchInput.addEventListener('input', function() {
          clearTimeout(searchTimeout);
          const query = this.value.trim();
          
          if (query.length < 3) {
            suggestionsContainer.style.display = 'none';
            return;
          }

          searchTimeout = setTimeout(() => {
            searchLocations(query);
          }, 500);
        });

        // Close suggestions when clicking outside
        document.addEventListener('click', function(e) {
          if (!e.target.closest('.search-wrapper')) {
            suggestionsContainer.style.display = 'none';
          }
        });
      });

      async function searchLocations(query) {
        try {
          const response = await fetch(`https://nominatim.openstreetmap.org/search?q=${query}+india&format=json&countrycodes=in&limit=5`);
          const data = await response.json();
          
          const suggestionsContainer = document.getElementById('suggestions');
          suggestionsContainer.innerHTML = '';
          
          if (data.length > 0) {
            data.forEach(place => {
              const div = document.createElement('div');
              div.className = 'suggestion-item';
              div.textContent = place.display_name;
              div.addEventListener('click', () => selectLocation(place));
              suggestionsContainer.appendChild(div);
            });
            suggestionsContainer.style.display = 'block';
          } else {
            suggestionsContainer.style.display = 'none';
          }
        } catch (error) {
          console.error('Error searching locations:', error);
        }
      }

      function selectLocation(place) {
        selectedLocation = {
          latitude: parseFloat(place.lat),
          longitude: parseFloat(place.lon)
        };

        // Update the input and address fields
        document.getElementById('searchLocation').value = place.display_name;
        document.getElementById('location').value = place.display_name;
        document.getElementById('coordinates').textContent = 
          `Selected coordinates: ${selectedLocation.latitude.toFixed(6)}, ${selectedLocation.longitude.toFixed(6)}`;
        
        // Hide suggestions
        document.getElementById('suggestions').style.display = 'none';
      }

      async function createToken(e) {
        e.preventDefault();
        
        if (!selectedLocation) {
          alert('Please select a location first');
          return;
        }

        const tokenData = {
          type: document.getElementById('type').value,
          quantity: document.getElementById('quantity').value,
          location: document.getElementById('location').value,
          coordinates: selectedLocation
        };

        try {
          const response = await fetch('http://localhost:5000/api/token', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `${localStorage.getItem('authToken')}`
            },
            body: JSON.stringify(tokenData)
          });

          const data = await response.json();
          console.log('Server response:', data);
          
          if (data.success) {
            alert('Token created successfully!');
            window.location.href = 'donorDashboard.html';
          } else {
            alert(data.message || 'Failed to create token');
          }
        } catch (error) {
          console.error('Error creating token:', error);
          alert('Failed to create token. Please try again.');
        }
      }

      // Handle form submission
      document.getElementById('tokenForm').addEventListener('submit', createToken);
    </script>
  </body>
</html>
